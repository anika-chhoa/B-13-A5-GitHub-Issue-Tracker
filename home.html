<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issue Tracker | Home</title>
    <!-- daisyUi and tailwind -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- link css -->
    <link rel="stylesheet" href="style.css" />

    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- font awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body class="bg-[#F8FAFC] min-h-screen">
    <header class="px-20 py-4 flex justify-between items-center bg-white">
      <div class="header-left flex gap-1">
        <div class="w-[36px]">
          <img src="./assets/github-logo.png" alt="" />
        </div>
        <h1 class="text-[#1f2937FF] text-2xl font-semibold">
          GitHub Issues Tracker
        </h1>
      </div>
      <div class="header-right flex gap-4">
        <label class="input">
          <svg
            class="h-[1em] opacity-50"
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
          >
            <g
              stroke-linejoin="round"
              stroke-linecap="round"
              stroke-width="2.5"
              fill="none"
              stroke="currentColor"
            >
              <circle cx="11" cy="11" r="8"></circle>
              <path d="m21 21-4.3-4.3"></path>
            </g>
          </svg>
          <input type="search" required placeholder="Search Issues" />
        </label>
        <button class="btn btn-primary text-white text-base">
          <i class="fa-solid fa-plus"></i> New Issue
        </button>
      </div>
    </header>
    <main class="max-w-[75%] mx-auto py-15">
      <section
        class="button-container bg-white p-6 border-white rounded-lg flex items-center gap-2 shadow-md mb-4"
      >
        <button
          onclick="toggleBtn('all')"
          id="btn-all"
          class="btn btn-primary w-[120px] text-white"
        >
          All
        </button>
        <button
          onclick="toggleBtn('open')"
          id="btn-open"
          class="btn bg-white text-slate-500 text-base font-medium border border-[#e4e4e7FF] w-[120px] py-2 px-3 rounded-lg"
        >
          Open
        </button>
        <button
          onclick="toggleBtn('close')"
          id="btn-close"
          class="btn bg-white text-slate-500 text-base font-medium border border-[#e4e4e7FF] w-[120px] py-2 px-3 rounded-lg"
        >
          Close
        </button>
      </section>

      <section
        class="trac-issue bg-white p-6 border-white rounded-t-lg shadow-md flex justify-between"
      >
        <div class="issue-left flex gap-2">
          <div
            class="w-[50px] h-[50px] rounded-full bg-[#ece4ffFF] flex justify-center items-center"
          >
            <img src="./assets/Aperture.png" alt="" />
          </div>
          <div class="">
            <h1 class="text-[#1f2937FF] text-xl font-semibold">
              <span id="issue-count"></span> Issues
            </h1>
            <h3 class="text-slate-500 text-base">
              Track and manage your project issues
            </h3>
          </div>
        </div>

        <div class="issue-right flex gap-4">
          <div class="flex gap-2 justify-center items-center">
            <div class="bg-emerald-500 w-3 h-3 rounded-full"></div>
            <p class="text-[#1f2937FF] font-medium">Open</p>
          </div>
          <div class="flex gap-2 justify-center items-center">
            <div class="bg-purple-500 w-3 h-3 rounded-full"></div>
            <p class="text-[#1f2937FF] font-medium">Close</p>
          </div>
        </div>
      </section>

      <section class="bg-[#fbfbfbFF] rounded-b-lg p-6 shadow-md">
        <div id="load-container" class="h-[60vh] flex hidden justify-center items-center">
          <span class="loading loading-spinner loading-xl"></span>
        </div>
        <div id="card-container" class="grid grid-cols-4 gap-3">
          <div
            class="card border border-[#e4e4e7FF] rounded-md shadow-md"
          ></div>
        </div>
      </section>

      <!-- single card details -->
      <div id="card-info">
        <div class="card-info-container">
          <dialog id="card-details" class="modal modal-bottom sm:modal-middle">
            <div class="modal-box p-8">
              <h3 class="text-2xl font-bold mb-2">Fix broken image uploads</h3>
              <ul class="flex gap-2 mb-6">
                <li class="badge badge-success text-white font-medium border rounded-[100px]">Opened</li>
                <li class="text-slate-600 flex justify-center items-center gap-2">
                    <div class="bg-slate-600 w-1 h-1 rounded-full"></div>
                    <p>Opened by Fahim Ahmed</p>
                </li>
                <li class="text-slate-600 flex justify-center items-center gap-2">
                    <div class="bg-slate-600 w-1 h-1 rounded-full"></div>
                    <p>22/02/2026</p>
                </li>
              </ul>
              <div class="flex gap-1 mb-6"></div>
              <p class="text-slate-600 mb-7">The navigation menu doesn't collapse properly on mobile devices. Need to fix the responsive behavior.</p>
              <div class="bg-[#f8fafcFF] rounded-l-lg p-4 grid grid-cols-2">
                <div class="col-span-1">
                  <p class="text-slate-600">Assignee:</p>
                  <p class="text-[#1f2937FF] font-semibold">Fahim</p>
                </div>
                <div class="col-span-1">
                  <p class="text-slate-600">Priority:</p>
                  <p class="badge badge-error text-white font-medium">High</p>
                </div>
              </div>
              <div class="modal-action">
                <form method="dialog">
                  <button class="btn btn-primary text-white">Close</button>
                </form>
              </div>
            </div>
          </dialog>
        </div>
      </div>
    </main>

    <script src="./script/home.js"></script>
  </body>
</html>
